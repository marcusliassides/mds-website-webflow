<!--
  MDS — Copy-to-clipboard.
  Used on /press-kit for "Copy link" buttons next to download tiles,
  and /brand for color hex tokens.

  Markup contract:
    <button class="btn btn--ghost" data-copy="https://digitalstudios.mattel.com/assets/press/...zip" aria-label="Copy download link">
      <span data-copy-label>Copy link</span>
    </button>

  After click, [data-copy-label] swaps to "Copied" for 1.6s and a
  shared role="status" region announces the result to assistive tech.
-->

<script>
  (function () {
    "use strict";

    var RESET_MS = 1600;

    function getStatus() {
      var status = document.querySelector("[data-copy-status]");
      if (status) return status;
      status = document.createElement("div");
      status.className = "sr-only";
      status.setAttribute("role", "status");
      status.setAttribute("aria-live", "polite");
      status.setAttribute("data-copy-status", "");
      document.body.appendChild(status);
      return status;
    }

    document.addEventListener("click", function (e) {
      var btn = e.target.closest("[data-copy]");
      if (!btn) return;
      e.preventDefault();
      var value = btn.getAttribute("data-copy");
      var label = btn.querySelector("[data-copy-label]") || btn;
      var original = label.textContent;
      if (!btn.getAttribute("aria-label")) {
        btn.setAttribute("aria-label", original.trim() || "Copy to clipboard");
      }

      var done = function (ok) {
        var message = ok ? "Copied to clipboard." : "Copy failed.";
        label.textContent = ok ? "Copied" : "Copy failed";
        getStatus().textContent = message;
        window.setTimeout(function () { label.textContent = original; }, RESET_MS);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(value).then(function () { done(true); }, function () { done(false); });
      } else {
        // Legacy fallback — execCommand is deprecated but still works
        // in Webflow's supported browser matrix.
        try {
          var ta = document.createElement("textarea");
          ta.value = value;
          ta.setAttribute("readonly", "");
          ta.style.position = "absolute";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          var ok = document.execCommand("copy");
          document.body.removeChild(ta);
          done(ok);
        } catch (err) { done(false); }
      }
    });
  })();
</script>
