<!--
  MDS — JSON-LD structured data.
  Each block is independent; paste into the matching page's custom
  code (Page Settings → Custom Code → Inside <head>).

  Webflow Designer note: text wrapped in {{...}} is meant to be replaced
  by Webflow CMS bindings — drop a "+ Add Field" inside the embed and
  pick the matching CMS field. JSON-encode every CMS string binding in
  this file before publish (quotes, backslashes and line breaks in titles
  or summaries otherwise invalidate the whole JSON-LD block). Date fields
  should render as ISO 8601 values.
-->

<!-- =====================================================================
     1. Organization — paste in Site Settings → Custom Code → Head Code.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Mattel Digital Studios",
  "alternateName": "MDS",
  "url": "https://digitalstudios.mattel.com",
  "logo": "https://digitalstudios.mattel.com/assets/og-card.png",
  "parentOrganization": {
    "@type": "Organization",
    "name": "Mattel, Inc.",
    "url": "https://corporate.mattel.com"
  },
  "sameAs": [
    "https://www.linkedin.com/company/mattel/",
    "https://corporate.mattel.com"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "El Segundo",
    "addressRegion": "CA",
    "addressCountry": "US"
  }
}
</script>

<!-- =====================================================================
     2. WebSite — paste in Site Settings → Custom Code → Head Code.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Mattel Digital Studios",
  "url": "https://digitalstudios.mattel.com",
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  }
}
</script>

<!-- =====================================================================
     3. Article (NewsArticle) — paste on /news/[slug] page custom code.
     Bind {{Title}}, {{Date}}, {{Summary}}, {{Slug}} from the News collection.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": "{{Title}}",
  "datePublished": "{{Date}}",
  "dateModified": "{{Date}}",
  "description": "{{Summary}}",
  "url": "https://digitalstudios.mattel.com/news/{{Slug}}",
  "image": "https://digitalstudios.mattel.com/assets/og-card.png",
  "author": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios",
    "logo": {
      "@type": "ImageObject",
      "url": "https://digitalstudios.mattel.com/assets/og-card.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://digitalstudios.mattel.com/news/{{Slug}}"
  }
}
</script>

<!-- =====================================================================
     4. VideoGame — paste on /games/[slug] page custom code.
     Bind {{Name}}, {{Slug}}, {{Summary}}, {{PlatformJsonArray}}, {{Studio}}.
     PlatformJsonArray is a JSON-safe array string generated from Platform,
     for example ["iOS","Android"].
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoGame",
  "name": "{{Name}}",
  "url": "https://digitalstudios.mattel.com/games/{{Slug}}",
  "description": "{{Summary}}",
  "gamePlatform": {{PlatformJsonArray}},
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  },
  "author": {
    "@type": "Organization",
    "name": "{{Studio}}"
  }
}
</script>

<!-- =====================================================================
     5. BreadcrumbList — paste on detail pages.
     Replace per-page; this is the /news/[slug] example.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://digitalstudios.mattel.com/" },
    { "@type": "ListItem", "position": 2, "name": "News", "item": "https://digitalstudios.mattel.com/news" },
    { "@type": "ListItem", "position": 3, "name": "{{Title}}", "item": "https://digitalstudios.mattel.com/news/{{Slug}}" }
  ]
}
</script>
