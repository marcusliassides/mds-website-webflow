<!--
  MDS — JSON-LD structured data.
  Each block is independent; paste into the matching page's custom
  code (Page Settings → Custom Code → Inside <head>).

  Webflow Designer note: text wrapped in {{...}} is meant to be replaced
  by Webflow CMS bindings — drop a "+ Add Field" inside the embed and
  pick the matching CMS field. Bind only JSON-safe helper fields in this
  file: escaped string fields, DateIso, PlatformJsonArray, and StudioJson.
-->

<!-- =====================================================================
     1. Organization — paste in Site Settings → Custom Code → Head Code.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Mattel Digital Studios",
  "alternateName": "MDS",
  "url": "https://digitalstudios.mattel.com",
  "logo": "https://digitalstudios.mattel.com/assets/og-card.png",
  "parentOrganization": {
    "@type": "Organization",
    "name": "Mattel, Inc.",
    "url": "https://corporate.mattel.com"
  },
  "sameAs": [
    "https://www.linkedin.com/company/mattel/",
    "https://www.instagram.com/mattel/",
    "https://www.youtube.com/user/Mattel",
    "https://corporate.mattel.com"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "El Segundo",
    "addressRegion": "CA",
    "addressCountry": "US"
  }
}
</script>

<!-- =====================================================================
     2. WebSite — paste in Site Settings → Custom Code → Head Code.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Mattel Digital Studios",
  "url": "https://digitalstudios.mattel.com",
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  }
}
</script>

<!-- =====================================================================
     3. Article (NewsArticle) — paste on /news/[slug] page custom code.
     Bind JSON-safe fields from the News collection:
     {{TitleJson}}, {{DateIso}}, {{SummaryJson}}, {{Slug}}.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": {{TitleJson}},
  "datePublished": "{{DateIso}}",
  "dateModified": "{{DateIso}}",
  "description": {{SummaryJson}},
  "url": "https://digitalstudios.mattel.com/news/{{Slug}}",
  "image": "https://digitalstudios.mattel.com/assets/og-card.png",
  "author": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios",
    "logo": {
      "@type": "ImageObject",
      "url": "https://digitalstudios.mattel.com/assets/og-card.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://digitalstudios.mattel.com/news/{{Slug}}"
  }
}
</script>

<!-- =====================================================================
     4. VideoGame — paste on /games/[slug] page custom code.
     Bind JSON-safe fields from the Games collection:
     {{NameJson}}, {{Slug}}, {{SummaryJson}}, {{PlatformJsonArray}}, {{StudioJson}}.
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoGame",
  "name": {{NameJson}},
  "url": "https://digitalstudios.mattel.com/games/{{Slug}}",
  "description": {{SummaryJson}},
  "gamePlatform": {{PlatformJsonArray}},
  "publisher": {
    "@type": "Organization",
    "name": "Mattel Digital Studios"
  },
  "author": {
    "@type": "Organization",
    "name": {{StudioJson}}
  }
}
</script>

<!-- =====================================================================
     5. BreadcrumbList — paste on /news/[slug].
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://digitalstudios.mattel.com/" },
    { "@type": "ListItem", "position": 2, "name": "News", "item": "https://digitalstudios.mattel.com/news" },
    { "@type": "ListItem", "position": 3, "name": {{TitleJson}}, "item": "https://digitalstudios.mattel.com/news/{{Slug}}" }
  ]
}
</script>

<!-- =====================================================================
     6. BreadcrumbList — paste on /games/[slug].
     ===================================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://digitalstudios.mattel.com/" },
    { "@type": "ListItem", "position": 2, "name": "Games", "item": "https://digitalstudios.mattel.com/games" },
    { "@type": "ListItem", "position": 3, "name": {{NameJson}}, "item": "https://digitalstudios.mattel.com/games/{{Slug}}" }
  ]
}
</script>
