<!--
  MDS — Global <body> end embed.
  Paste into Webflow → Site Settings → Custom Code → Footer Code.
  Includes:
    - Dark mode toggle wiring (any element with [data-theme-toggle])
    - Cookie consent banner (lightweight, no third-party)
    - Consent events for GA4 / pixel hooks
-->

<script>
  (function () {
    "use strict";

    /* ===== Dark mode toggle =====
       Mark any control with data-theme-toggle. Optional [data-theme-icon-light]
       / [data-theme-icon-dark] children get show/hidden automatically. */
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      try { localStorage.setItem("mds-theme", theme); } catch (e) {}
      document.querySelectorAll("[data-theme-toggle]").forEach(function (btn) {
        btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
      });
      document.querySelectorAll("[data-theme-icon-light]").forEach(function (el) {
        el.style.display = theme === "dark" ? "none" : "";
      });
      document.querySelectorAll("[data-theme-icon-dark]").forEach(function (el) {
        el.style.display = theme === "dark" ? "" : "none";
      });
    }

    document.addEventListener("click", function (e) {
      var btn = e.target.closest("[data-theme-toggle]");
      if (!btn) return;
      e.preventDefault();
      var current = document.documentElement.getAttribute("data-theme") || "light";
      applyTheme(current === "dark" ? "light" : "dark");
    });

    // Initialise toggles to current state
    applyTheme(document.documentElement.getAttribute("data-theme") || "light");

    /* ===== Cookie consent =====
       Show banner once. Marks acceptance in localStorage.
       Banner element: #mds-cookie-banner with [data-cookie-accept] and
       [data-cookie-decline] controls inside. Analytics snippets should load
       only after the mds:consent-change event reports accepted=true. */
    var CONSENT_KEY = "mds-cookie-consent";
    var banner = document.getElementById("mds-cookie-banner");
    if (banner) {
      var consent;
      try { consent = localStorage.getItem(CONSENT_KEY); } catch (e) {}
      if (!consent) {
        banner.removeAttribute("hidden");
      }
      banner.addEventListener("click", function (e) {
        var accept = e.target.closest("[data-cookie-accept]");
        var decline = e.target.closest("[data-cookie-decline]");
        if (!accept && !decline) return;
        try { localStorage.setItem(CONSENT_KEY, accept ? "accepted" : "declined"); } catch (e) {}
        banner.setAttribute("hidden", "");
        window.dispatchEvent(new CustomEvent("mds:consent-change", {
          detail: { accepted: Boolean(accept) }
        }));
        if (accept) window.dispatchEvent(new CustomEvent("mds:consent-accepted"));
      });
    }

    /* ===== Page reveal =====
       Adds .is-revealed when the page has loaded so IX2 fade-ins can hook
       a single class without depending on Webflow's load events. */
    requestAnimationFrame(function () {
      document.documentElement.classList.add("is-revealed");
    });
  })();
</script>
