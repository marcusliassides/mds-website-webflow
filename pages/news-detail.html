<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{Title}} — Mattel Digital Studios</title>
  <meta name="description" content="{{SummaryPlain}}">
  <link rel="canonical" href="https://digitalstudios.mattel.com/news/{{Slug}}">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">

  <!-- Open Graph — bind from CMS -->
  <meta property="og:title" content="{{Title}}">
  <meta property="og:description" content="{{SummaryPlain}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://digitalstudios.mattel.com/news/{{Slug}}">
  <meta property="og:image" content="https://digitalstudios.mattel.com/assets/og-card.png">
  <meta property="article:published_time" content="{{DateIso}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@mattel">

  <!-- Page-level: paste NewsArticle + BreadcrumbList JSON-LD blocks from embeds/json-ld.html -->
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- NAV symbol -->

  <main id="main">

    <!-- =====================================================================
         ARTICLE — Collection Template Page (CMS: News)
         ===================================================================== -->
    <article class="section section--md">
      <div class="container container--narrow">

        <nav aria-label="Breadcrumb" class="t-mono muted" style="margin-bottom:24px">
          <a href="/" style="color:inherit;text-decoration:none">Home</a>
          <span aria-hidden="true"> / </span>
          <a href="/news" style="color:inherit;text-decoration:none">News</a>
          <span aria-hidden="true"> / </span>
          <span aria-current="page">{{Title}}</span>
        </nav>

        <span class="eyebrow">{{Tag}}</span>
        <h1 class="t-page" style="margin-top:8px">{{Title}}</h1>

        <div class="cluster" style="margin-top:24px">
          <time class="t-mono muted" datetime="{{Date}}">{{Date}}</time>
          <span class="t-mono muted">·</span>
          <span class="t-mono muted">{{Byline}}</span>
        </div>

        <p class="t-serif" style="margin-top:32px;font-size:22px;line-height:1.55">
          {{Summary}}
        </p>

        <div class="prose" style="margin-top:48px">
          <!-- CMS Rich Text: {{Body}} — Webflow renders <p>, <h2>, <a>, etc. -->
          {{Body}}
        </div>

        <hr style="margin:64px 0;border:0;border-top:1px solid var(--border-hairline)">

        <div class="cluster">
          <a href="/news" class="btn btn--ghost">← All news</a>
          <a href="/press-kit" class="btn btn--secondary">Open press kit</a>
        </div>
      </div>
    </article>

    <!-- =====================================================================
         RELATED — three latest other items.
         CMS: News Collection, sort Date desc, exclude current item, limit 3.
         ===================================================================== -->
    <section class="section section--md" style="background:var(--surface-elevated)">
      <div class="container">
        <h2 class="t-block">More from MDS.</h2>
        <div class="grid-3" style="margin-top:32px">
          <!-- Webflow nested Collection List: News, sort Date desc, exclude current item, limit 3.
               Bind these fields from each related News item. -->
          <a href="/news/{{Slug}}" class="card">
            <span class="t-eyebrow">{{Tag}}</span>
            <h3 class="t-card-md" style="margin-top:12px">{{Title}}</h3>
            <p class="t-mono muted" style="margin-top:12px">{{Date}}</p>
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER symbol -->
</body>
</html>
