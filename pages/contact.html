<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Mattel Digital Studios</title>
  <meta name="description" content="Reach Mattel Digital Studios for partnerships, press, and licensing inquiries.">
  <link rel="canonical" href="https://digitalstudios.mattel.com/contact">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- NAV symbol -->

  <main id="main">

    <section class="section section--md">
      <div class="container">

        <div class="grid-2" style="gap:80px;align-items:start">

          <div>
            <span class="eyebrow">Contact</span>
            <h1 class="t-page" style="margin-top:8px">
              Get in touch.
            </h1>
            <p class="t-body-lg muted" style="margin-top:24px">
              Tell us what you're working on. We respond within two business days.
            </p>

            <div style="margin-top:48px">
              <div style="border-top:1px solid var(--border-hairline);padding:20px 0">
                <p class="t-eyebrow">Partnerships</p>
                <p class="t-card-md" style="margin-top:6px">partnerships@digitalstudios.mattel.com</p>
              </div>
              <div style="border-top:1px solid var(--border-hairline);padding:20px 0">
                <p class="t-eyebrow">Press</p>
                <p class="t-card-md" style="margin-top:6px">press@digitalstudios.mattel.com</p>
              </div>
              <div style="border-top:1px solid var(--border-hairline);border-bottom:1px solid var(--border-hairline);padding:20px 0">
                <p class="t-eyebrow">Investors</p>
                <p class="t-card-md" style="margin-top:6px">investors.mattel.com</p>
              </div>
            </div>
          </div>

          <!-- =====================================================================
               FORM — Webflow native form, wired to Zapier → Salesforce.
               See forms/zapier-salesforce.md for the integration steps.
               ===================================================================== -->
          <form name="MDS Contact" data-name="MDS Contact" method="POST"
                style="background:var(--surface-elevated);padding:32px;border-radius:var(--radius-card-lg);border:1px solid var(--border-hairline)">

            <div class="form-field">
              <label class="form-label" for="contact-name">Name</label>
              <input class="form-input" type="text" id="contact-name" name="name" required maxlength="120" autocomplete="name">
            </div>

            <div class="form-field">
              <label class="form-label" for="contact-email">Work email</label>
              <input class="form-input" type="email" id="contact-email" name="email" required autocomplete="email">
            </div>

            <div class="form-field">
              <label class="form-label" for="contact-company">Company</label>
              <input class="form-input" type="text" id="contact-company" name="company" autocomplete="organization">
            </div>

            <div class="form-field">
              <label class="form-label" for="contact-topic">Topic</label>
              <select class="form-select" id="contact-topic" name="topic" required>
                <option value="">Choose one…</option>
                <option>Partnership</option>
                <option>Licensing</option>
                <option>Press</option>
                <option>Investor</option>
                <option>Other</option>
              </select>
            </div>

            <div class="form-field">
              <label class="form-label" for="contact-message">Message</label>
              <textarea class="form-textarea" id="contact-message" name="message" rows="5" required maxlength="2000"></textarea>
            </div>

            <!-- Honeypot (hidden from users; bots fill it; submissions where this is non-empty are dropped server-side) -->
            <input type="text" name="website" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" aria-hidden="true">

            <button type="submit" class="btn btn--primary" style="width:100%;margin-top:8px">Send</button>

            <p class="t-body-sm muted" style="margin-top:16px">
              By submitting, you agree to Mattel's <a href="https://corporate.mattel.com/privacy">privacy policy</a>.
            </p>
          </form>

        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER symbol -->
</body>
</html>
